<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XLKS Shop</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
    }

    header {
      background: #111;
      padding: 15px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      border-bottom: 2px solid #222;
    }

    .container {
      padding: 20px;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }

    .card {
      background: #1a1a1a;
      border-radius: 10px;
      padding: 15px;
      text-align: center;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
      transition: 0.2s;
    }

    .card:hover {
      transform: scale(1.03);
    }

    .card img {
      width: 100%;
      border-radius: 8px;
    }

    .price {
      color: #00ffcc;
      margin: 10px 0;
      font-size: 18px;
    }

    button {
      background: #00ffcc;
      border: none;
      padding: 10px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #00ccaa;
    }

    .cart {
      position: fixed;
      top: 10px;
      right: 10px;
      background: #222;
      padding: 10px 15px;
      border-radius: 8px;
      font-size: 14px;
    }
  </style>
</head>
<body>

<header>🛒 XLKS Shop</header>

<div class="cart">
  Cart: <span id="cart-count">0</span>
</div>

<div class="container">
  <div class="products">

    <div class="card">
      <img src="https://via.placeholder.com/200" alt="Item">
      <h3>Starter Item</h3>
      <p class="price">$5.00</p>
      <button onclick="addToCart()">Add to Cart</button>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/200" alt="Item">
      <h3>Cool Product</h3>
      <p class="price">$10.00</p>
      <button onclick="addToCart()">Add to Cart</button>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/200" alt="Item">
      <h3>Premium Item</h3>
      <p class="price">$20.00</p>
      <button onclick="addToCart()">Add to Cart</button>
    </div>

  </div>
</div>

<script>
  let cart = 0;

  function addToCart() {
    cart++;
    document.getElementById("cart-count").innerText = cart;
  }
</script>

</body>
</html>
