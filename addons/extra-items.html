<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XLKS Shop - Extra Items</title>

  <!-- Link your blue theme -->
  <link rel="stylesheet" href="../blue.css">

  <style>
    .container {
      padding: 20px;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }

    .card {
      padding: 15px;
      border-radius: 10px;
      text-align: center;
    }

    img {
      width: 100%;
      border-radius: 8px;
    }

    .price {
      margin: 10px 0;
      font-size: 18px;
      color: #00cfff;
    }

    .top-bar {
      text-align: center;
      padding: 15px;
    }

    a {
      color: #00cfff;
      text-decoration: none;
      margin: 0 10px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="top-bar">
  <a href="../index.html">Home</a>
  <a href="../cart.html">Cart</a>
  <a href="../page2.html">Info</a>
</div>

<div class="container">
  <h1>✨ Extra Items</h1>

  <div class="products">

    <div class="card">
      <img src="https://via.placeholder.com/200">
      <h3>Bonus Pack</h3>
      <p class="price">$8.00</p>
      <button onclick="addToCart({name:'Bonus Pack', price:8})">Add to Cart</button>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/200">
      <h3>VIP Item</h3>
      <p class="price">$50.00</p>
      <button onclick="addToCart({name:'VIP Item', price:50})">Add to Cart</button>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/200">
      <h3>Secret Drop</h3>
      <p class="price">$25.00</p>
      <button onclick="addToCart({name:'Secret Drop', price:25})">Add to Cart</button>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/200">
      <h3>Dev Item 👀</h3>
      <p class="price">$999.00</p>
      <button onclick="addToCart({name:'Dev Item', price:999})">Add to Cart</button>
    </div>

  </div>
</div>

<script>
  function addToCart(item) {
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    cart.push(item);
    localStorage.setItem("cart", JSON.stringify(cart));
    alert(item.name + " added to cart!");
  }
</script>

</body>
</html>
